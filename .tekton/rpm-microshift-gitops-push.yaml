apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/rh-gitops-midstream/release?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "push" && target_branch
      == "main" && ( "rpms/microshift-gitops/***".pathChanged() || ".tekton/rpm-microshift-gitops-push.yaml".pathChanged()
      )
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: gitops-main
    appstudio.openshift.io/component: rpm-microshift-gitops-main
    pipelines.appstudio.openshift.io/type: build
  name: rpm-microshift-gitops-main-on-push
  namespace: rh-openshift-gitops-tenant
spec:
  params:
  - name: ociStorage
    value: quay.io/redhat-user-workloads/rh-openshift-gitops-tenant/rpm-microshift-gitops-main:{{revision}}
  - name: monorepo-subdir
    value: rpms/microshift-gitops
  - name: specfile
    value: microshift-gitops.spec
  - name: package-name
    value: microshift-gitops
  - name: git-url
    value: "https://github.com/nmirasch/distgit-rpm-testing"
  - name: revision
    value: "main"
  - name: target-branch
    value: "main"
  - name: mock-config-template-filename-in-sources
    value: "rpms/microshift-gitops/mock.cfg"
  - name: hermetic
    value: "true"
  - name: build-architectures
    value:
    - aarch64
    - x86_64
  # Pin pipeline and task refs to a commit SHA for Conforma (tasks.pinned_task_refs / trusted_task.pinned)
  - name: self-ref-url
    value: "https://github.com/konflux-ci/rpmbuild-pipeline.git"
  - name: self-ref-revision
    value: "8153cd094db31d2397f04a312dfb71747e46e0aa"
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: "https://github.com/konflux-ci/rpmbuild-pipeline.git"
    - name: revision
      value: "8153cd094db31d2397f04a312dfb71747e46e0aa"
    - name: pathInRepo
      value: pipeline/build-rpm-package.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-rpm-microshift-gitops-main
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}

