---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: install-operator-bundle
spec:
  description: |
    Installs the GitOps operator directly from its bundle image (via
    `operator-sdk run bundle`) on an ephemeral cluster and reports the
    installed CSV. Unlike a full FBC catalog install, a single bundle has
    no channel/upgrade concept.
  params:
    - name: testImageUrl
      type: string
    - name: eaasSpaceSecretRef
      type: string
    - name: clusterName
      type: string
    - name: pipelineRunName
      type: string
    - name: openshiftVersion
      type: string
    - name: namespace
      type: string
      default: "openshift-gitops-operator"
    - name: installTimeout
      type: string
      default: "25m"
    - name: snapshot
      type: string
      description: Raw SNAPSHOT JSON, used to look up the bundle image reference
    - name: bundleComponentName
      type: string
      default: "gitops-operator-bundle-main"
    - name: quayRepo
      type: string
      default: "quay.io/devtools_gitops/test_image"
  results:
    - name: installedCSV
      value: "$(steps.get-installed-version.results.installedCSV)"
  volumes:
    - name: credentials
      emptyDir: {}
    - name: quay-credentials
      secret:
        secretName: gitops-test-runner-image-push
    - name: quay-pull-credentials
      secret:
        secretName: gitops-quay-pull-secret-merged
  steps:
    - name: get-kubeconfig
      ref:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
      params:
        - name: eaasSpaceSecretRef
          value: $(params.eaasSpaceSecretRef)
        - name: clusterName
          value: $(params.clusterName)
        - name: credentials
          value: credentials
    - name: install-operator-bundle
      image: $(params.testImageUrl)
      volumeMounts:
        - name: credentials
          mountPath: /credentials
        - name: quay-credentials
          mountPath: /quay-credentials
          readOnly: true
        - name: quay-pull-credentials
          mountPath: /quay-pull-credentials
          readOnly: true
      env:
        - name: OPENSHIFT_VERSION
          value: $(params.openshiftVersion)
        - name: NAMESPACE
          value: $(params.namespace)
        - name: INSTALL_TIMEOUT
          value: $(params.installTimeout)
        - name: SNAPSHOT
          value: $(params.snapshot)
        - name: BUNDLE_COMPONENT_NAME
          value: $(params.bundleComponentName)
        - name: KUBECONFIG
          value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
        - name: TASK_LOG_NAME
          value: "install-operator-bundle"
        - name: PIPELINE_RUN_NAME
          value: $(params.pipelineRunName)
        - name: QUAY_REPO
          value: $(params.quayRepo)
      command:
        - /bin/bash
        - -c
        - |
          /usr/local/bin/print-cluster-login-info.sh
          /usr/local/bin/run-and-save-logs.sh /usr/local/bin/install-operator-bundle.sh
    - name: get-installed-version
      image: $(params.testImageUrl)
      results:
        - name: installedCSV
      volumeMounts:
        - name: credentials
          mountPath: /credentials
      env:
        - name: KUBECONFIG
          value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
        - name: NAMESPACE
          value: $(params.namespace)
        - name: USE_SUBSCRIPTION
          value: "false"
        - name: RESULT_PATH
          value: "$(step.results.installedCSV.path)"
      command:
        - /usr/local/bin/get-installed-version.sh
