---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: gitops-operator-bundle-sanity
spec:
  description: |
    An integration test which provisions an ephemeral Hypershift cluster, installs the
    GitOps operator directly from its bundle image (via `operator-sdk run bundle`,
    no full FBC catalog involved), and runs the sanity test suite.
  params:
    - description: Snapshot of the application
      name: SNAPSHOT
      default: '{"components": [{"name":"gitops-operator-bundle-main", "containerImage": "quay.io/redhat-user-workloads/rh-openshift-gitops-tenant/gitops-operator-bundle:latest"}]}'
      type: string
    - description: Name of the SNAPSHOT component holding the bundle image to install
      name: BUNDLE_COMPONENT_NAME
      default: "gitops-operator-bundle-main"
      type: string
    - description: Namespace where the Operator bundle will be deployed.
      name: NAMESPACE
      default: default
      type: string
    - description: Duration to wait for bundle installation to complete before failing.
      name: INSTALL_TIMEOUT
      default: 25m
      type: string
    - description: Git URL of the release repository (used to resolve task definitions and the images-mirror-set)
      name: CATALOG_TASK_URL
      default: "https://github.com/rh-gitops-midstream/release"
      type: string
    - description: Git revision for task definitions
      name: CATALOG_TASK_REVISION
      default: "konflux-integration"
      type: string
    - description: OpenShift version to provision (minor version e.g. "4.14", or full patch version e.g. "4.14.57")
      name: OPENSHIFT_VERSION
      default: "4.14"
      type: string
    - description: Enable FIPS mode for the ephemeral cluster
      name: FIPS_ENABLED
      default: "false"
      type: string
    - description: Git URL of the test repository
      name: TEST_REPO_URL
      default: "https://github.com/redhat-developer/gitops-operator.git"
      type: string
    - description: Git branch or revision of the test repository
      name: TEST_REPO_BRANCH
      default: "master"
      type: string
    - description: Test runner script name
      name: TEST_SCRIPT
      default: "run-sanity-tests.sh"
      type: string
    - description: AWS instance type for the ephemeral cluster (e.g., m6g.large, m6g.xlarge, m6g.2xlarge)
      name: CLUSTER_INSTANCE_TYPE
      default: "m6g.large"
      type: string
    - description: PR label required to run tests (empty = no gating, always run). When set, push events always proceed but pull_request events require this label on the PR.
      name: GATE_LABEL
      default: ""
      type: string

  finally:
    - name: pipeline-wrapup
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/integration-tests/tasks/pipeline-wrapup.yaml
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: "$(tasks.provision-cluster.results.clusterName)"
        - name: pipelineRunName
          value: "$(context.pipelineRun.name)"
        - name: testImageUrl
          value: "$(tasks.overlay-test-scripts.results.image-url)"
        - name: aggregateStatus
          value: "$(tasks.status)"
        - name: logUrl
          value: "https://konflux-ui.apps.stone-prd-rh01.pg1f.p1.openshiftapps.com/ns/rh-openshift-gitops-tenant/applications/gitops-main/pipelineruns/$(context.pipelineRun.name)"
        - name: pipelineName
          value: "gitops-operator-bundle-sanity"
        - name: namespace
          value: "openshift-gitops-operator"
        - name: taskNames
          value: "install-operator-bundle test-operator logs"
        - name: openshiftVersion
          value: "$(params.OPENSHIFT_VERSION)"
        - name: resolvedOpenshiftVersion
          value: "$(tasks.provision-cluster.results.resolvedVersion)"
        - name: operatorChannel
          value: "bundle"
        - name: fipsEnabled
          value: "$(params.FIPS_ENABLED)"
        - name: installedCSV
          value: "$(tasks.install-operator-bundle.results.installedCSV)"
        - name: testScript
          value: "$(params.TEST_SCRIPT)"
        - name: testRepoUrl
          value: "$(params.TEST_REPO_URL)"
        - name: testRepoBranch
          value: "$(params.TEST_REPO_BRANCH)"
        - name: upgrade
          value: "false"

  tasks:
    - name: parse-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/integration-examples
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/test_metadata.yaml
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)

    - name: check-gate
      runAfter:
        - parse-metadata
      taskSpec:
        params:
          - name: gate-labels
            type: string
          - name: source-git-url
            type: string
          - name: source-git-revision
            type: string
          - name: catalog-task-url
            type: string
          - name: catalog-task-revision
            type: string
        results:
          - name: proceed
            description: "true if tests should run, false to skip"
        steps:
          - name: check
            ref:
              resolver: git
              params:
                - name: url
                  value: $(params.catalog-task-url)
                - name: revision
                  value: $(params.catalog-task-revision)
                - name: pathInRepo
                  value: .tekton/integration-tests/stepactions/check-gate-labels.yaml
            params:
              - name: gate-labels
                value: $(params.gate-labels)
              - name: source-git-url
                value: $(params.source-git-url)
              - name: source-git-revision
                value: $(params.source-git-revision)
          - name: propagate-result
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            script: |
              #!/bin/sh
              cat /tekton/steps/step-check/results/proceed > $(results.proceed.path)
      params:
        - name: gate-labels
          value: $(params.GATE_LABEL)
        - name: source-git-url
          value: $(tasks.parse-metadata.results.source-git-url)
        - name: source-git-revision
          value: $(tasks.parse-metadata.results.source-git-revision)
        - name: catalog-task-url
          value: $(params.CATALOG_TASK_URL)
        - name: catalog-task-revision
          value: $(params.CATALOG_TASK_REVISION)

    - name: build-test-image
      runAfter:
        - check-gate
      when:
        - input: $(tasks.check-gate.results.proceed)
          operator: in
          values: ["true"]
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/integration-tests/tasks/build-ginkgo-test-image.yaml
      params:
        - name: SOURCE_URL
          value: $(params.CATALOG_TASK_URL)
        - name: SOURCE_REVISION
          value: $(params.CATALOG_TASK_REVISION)
        - name: DOCKERFILE_PATH
          value: ".tekton/integration-tests/test-image/Dockerfile"
        - name: CONTEXT_DIR
          value: ".tekton/integration-tests/test-image"
        - name: IMAGE_EXPIRES_AFTER
          value: "7d"

    - name: overlay-test-scripts
      runAfter:
        - build-test-image
      when:
        - input: $(tasks.check-gate.results.proceed)
          operator: in
          values: ["true"]
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/integration-tests/tasks/overlay-test-scripts.yaml
      params:
        - name: BASE_IMAGE_URL
          value: $(tasks.build-test-image.results.IMAGE_URL)
        - name: SOURCE_URL
          value: $(params.CATALOG_TASK_URL)
        - name: SOURCE_REVISION
          value: $(params.CATALOG_TASK_REVISION)

    - name: provision-eaas-space
      runAfter:
        - overlay-test-scripts
      when:
        - input: $(tasks.check-gate.results.proceed)
          operator: in
          values: ["true"]
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
      params:
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)

    - name: provision-cluster
      runAfter:
        - provision-eaas-space
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/integration-tests/tasks/provision-cluster.yaml
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: catalogSourceUrl
          value: $(params.CATALOG_TASK_URL)
        - name: catalogSourceRevision
          value: $(params.CATALOG_TASK_REVISION)
        - name: catalogTaskUrl
          value: $(params.CATALOG_TASK_URL)
        - name: catalogTaskRevision
          value: $(params.CATALOG_TASK_REVISION)
        - name: openshiftVersion
          value: $(params.OPENSHIFT_VERSION)
        - name: fipsEnabled
          value: $(params.FIPS_ENABLED)
        - name: clusterInstanceType
          value: $(params.CLUSTER_INSTANCE_TYPE)

    - name: install-operator-bundle
      runAfter:
        - provision-cluster
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/integration-tests/tasks/install-operator-bundle.yaml
      params:
        - name: testImageUrl
          value: "$(tasks.overlay-test-scripts.results.image-url)"
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: "$(tasks.provision-cluster.results.clusterName)"
        - name: pipelineRunName
          value: "$(context.pipelineRun.name)"
        - name: openshiftVersion
          value: "$(params.OPENSHIFT_VERSION)"
        - name: installTimeout
          value: "$(params.INSTALL_TIMEOUT)"
        - name: snapshot
          value: "$(params.SNAPSHOT)"
        - name: bundleComponentName
          value: "$(params.BUNDLE_COMPONENT_NAME)"

    - name: test-operator
      runAfter:
        - install-operator-bundle
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.CATALOG_TASK_URL)
          - name: revision
            value: $(params.CATALOG_TASK_REVISION)
          - name: pathInRepo
            value: .tekton/integration-tests/tasks/test-operator.yaml
      params:
        - name: testImageUrl
          value: "$(tasks.overlay-test-scripts.results.image-url)"
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: "$(tasks.provision-cluster.results.clusterName)"
        - name: pipelineRunName
          value: "$(context.pipelineRun.name)"
        - name: testRepoUrl
          value: "$(params.TEST_REPO_URL)"
        - name: testRepoBranch
          value: "$(params.TEST_REPO_BRANCH)"
        - name: testScript
          value: "$(params.TEST_SCRIPT)"
        - name: openshiftVersion
          value: "$(params.OPENSHIFT_VERSION)"
