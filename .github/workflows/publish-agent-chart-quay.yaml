name: Publish Agent Helm Chart to Quay

on:
  workflow_dispatch:
    inputs:
      TARGET_BRANCH:
        description: 'Target branch to publish from (e.g. main, release-1.17)'
        required: true
        type: string
  push:
    branches:
      - main
      - release-*
    paths:
      - helm-charts/redhat-argocd-agent/**

permissions:
  contents: read
  packages: write

jobs:
  publish-chart:
    name: Build and Publish Agent Chart
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@8410ad0602e1e429cee44a835ae9f77f654a6694 # v4.0.0
        with:
          fetch-depth: 1
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.TARGET_BRANCH || github.ref_name }}
          submodules: true

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Build chart package
        run: make agent-helm-chart-package

      - name: Login to Quay
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.QUAY_TOKEN }}" | helm registry login quay.io -u "${{ secrets.QUAY_USERNAME }}" --password-stdin

      - name: Push chart to Quay
        shell: bash
        run: |
          set -euo pipefail
          make agent-helm-chart-push CHART_REGISTRY="oci://quay.io/svghadi"

      - name: Output test command
        shell: bash
        run: |
          set -euo pipefail
          CHART_ARCHIVE=$(ls -1 dist/*.tgz | head -n1)
          CHART_FILE=$(basename "${CHART_ARCHIVE}")
          CHART_VERSION=$(echo "${CHART_FILE}" | sed -E 's/^.*-([0-9][0-9A-Za-z\.-]*)\.tgz$/\1/')
          echo "Run this to test:"
          echo "helm install agent-test oci://quay.io/svghadi/redhat-argocd-agent --version ${CHART_VERSION}"
